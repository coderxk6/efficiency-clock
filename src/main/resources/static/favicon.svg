<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d" />
      <stop offset="100%" stop-color="#eab308" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="100" height="100" rx="24" fill="url(#bg)" />

  <circle cx="50" cy="50" r="35" fill="none" stroke="url(#accent)" stroke-width="2" stroke-dasharray="2 6" />
  
  <path d="M 50 20 C 60 40, 80 50, 50 80 C 20 50, 40 40, 50 20 Z" fill="url(#accent)" opacity="0.15" />
  <path d="M 20 50 C 40 40, 50 20, 80 50 C 50 80, 40 60, 20 50 Z" fill="url(#accent)" opacity="0.15" />
  
  <circle cx="50" cy="50" r="28" fill="none" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" stroke-dasharray="40 100" />
  <circle cx="50" cy="50" r="28" fill="none" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" stroke-dasharray="40 100" transform="rotate(180 50 50)" />

  <circle cx="50" cy="50" r="5" fill="url(#gold)" filter="url(#glow)"/>
  
  <line x1="50" y1="50" x2="50" y2="30" stroke="url(#gold)" stroke-width="3.5" stroke-linecap="round" />
  <line x1="50" y1="50" x2="62" y2="62" stroke="url(#gold)" stroke-width="3.5" stroke-linecap="round" />
</svg>
